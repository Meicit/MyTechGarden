<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BH-AI | Kho lưu trữ công nghệ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #050505;
            color: #e5e7eb;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        /* Hiệu ứng kính mờ nâng cao */
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border-color: #00ff99;
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 255, 153, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }
        /* Thanh search Neon */
        .neon-input:focus {
            border-color: #00ff99;
            box-shadow: 0 0 15px rgba(0, 255, 153, 0.3);
        }
        /* Animation khi hiện Card */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-card {
            animation: fadeInUp 0.5s ease forwards;
        }
        .neon-text { color: #00ff99; }
    </style>
</head>
<body class="min-h-screen">

    <header class="sticky top-0 z-50 py-6 px-4 bg-[#050505]/90 backdrop-blur-lg border-b border-white/5">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-[#00ff99] flex items-center justify-center shadow-[0_0_15px_rgba(0,255,153,0.5)]">
                    <i class="fa-solid fa-microchip text-black text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tighter neon-text uppercase italic">
                    Bình Hưng <span class="text-white">và AI</span>
                </h1>
            </div>
            
            <div class="relative w-full md:w-96 group">
                <input type="text" id="searchInput" 
                    placeholder="Tìm kiếm tips, prompt, video..." 
                    class="w-full bg-white/5 border border-white/10 rounded-2xl py-3 px-12 outline-none neon-input transition-all duration-300">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-[#00ff99]"></i>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-12 pb-20">
        <div class="flex flex-wrap items-center gap-3 mb-10" id="categoryFilters">
            <span class="text-xs font-bold text-gray-500 uppercase tracking-widest mr-2">Lọc theo:</span>
            <button class="filter-btn active px-5 py-2 rounded-xl text-sm font-semibold glass-card neon-text border-[#00ff99]/40" data-cat="all">Tất cả</button>
            <button class="filter-btn px-5 py-2 rounded-xl text-sm font-semibold glass-card hover:text-[#00ff99]" data-cat="AI Tool">AI Tool</button>
            <button class="filter-btn px-5 py-2 rounded-xl text-sm font-semibold glass-card hover:text-[#00ff99]" data-cat="Prompt">Prompt</button>
            <button class="filter-btn px-5 py-2 rounded-xl text-sm font-semibold glass-card hover:text-[#00ff99]" data-cat="Video">Video</button>
            <button class="filter-btn px-5 py-2 rounded-xl text-sm font-semibold glass-card hover:text-[#00ff99]" data-cat="Thủ thuật">Thủ thuật</button>
        </div>

        <div id="contentGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>

        <div id="noResult" class="hidden flex flex-col items-center justify-center py-24 opacity-50">
            <i class="fa-solid fa-box-open text-5xl mb-4"></i>
            <p class="italic text-lg font-light tracking-wide">Không tìm thấy nội dung yêu cầu...</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
